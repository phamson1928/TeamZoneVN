version: '3.8'

services:
  # ================================
  # Redis (caching, presence, leaderboard, rate limiting)
  # ================================
  redis:
    image: redis:7-alpine
    container_name: TeamZoneVN_Redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ================================
  # NestJS App - Development
  # ================================
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: TeamZoneVN_App_Dev
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=development
    depends_on:
      redis:
        condition: service_started
    networks:
      - app-network
    profiles:
      - dev

  # ================================
  # NestJS App - Production
  # ================================
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: TeamZoneVN_App_Prod
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_started
    networks:
      - app-network
    profiles:
      - prod

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
