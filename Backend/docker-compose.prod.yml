version: "3.8"

services:
  # ================================
  # Redis (caching, presence, leaderboard, rate limiting)
  # ================================
  redis:
    image: redis:7-alpine
    container_name: TeamZoneVN_Redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379" # chỉ listen local để backend access
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ================================
  # NestJS Backend (Production)
  # ================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: TeamZoneVN_Backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000" # chỉ Nginx mới gọi được, không expose ra ngoài
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-network

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge
